app:
  log_level: "info"
  env: "development"

binance:
  api_key: "YOUR_BINANCE_API_KEY"
  api_secret: "YOUR_BINANCE_API_SECRET"
  testnet: true

hyperliquid:
  account_address: "0xdc899ed4a80e7bbe7c86307715507c828901f196"

redis:
  host: "localhost"
  port: 6379
  password: ""
  db: 0

trading:
  mode: "fixed"
  fixed_ratio: 0.1
  equal_ratio: 1.0
  min_order_size:
    HYPEUSDT: 0.5
  long_only: true
  tp_use_market: true

risk_control:
  supported_coins:
    - "HYPEUSDT"
  max_position_size:
    HYPEUSDT: 10000.0
  emergency_stop: false
  max_smart_sync_cycles: 12
  tp_desync_check_interval: 60
