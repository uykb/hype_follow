app:
  log_level: "info"
  env: "development"

binance:
  api_key: "YOUR_BINANCE_API_KEY"
  api_secret: "YOUR_BINANCE_API_SECRET"
  testnet: true

hyperliquid:
  account_address: "0xdc899ed4a80e7bbe7c86307715507c828901f196"

trading:
  mode: "fixed"
  fixed_ratio: 0.1
  equal_ratio: 1.0
  min_order_size:
    HYPE: 1.0

risk_control:
  supported_coins:
    - "HYPE"
  max_position_size:
    HYPE: 1000.0
  emergency_stop: false
